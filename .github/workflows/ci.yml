# Builds the leafdocs CLI, runs a smoke test (scaffold a site, then generate it),
# and validates the publishable package contents.
# For more information see:
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 20, 22, 24 ]

    steps:
      - uses: actions/checkout@v6.0.3

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Smoke test (init + build)
        run: |
          tmp="$(mktemp -d)"
          node cli.mjs init "$tmp"
          node cli.mjs --root "$tmp"
          test -d "$tmp/dist"
          echo "✅ generated site in $tmp/dist"

      - name: Validate package contents
        run: pnpm pack --dry-run
